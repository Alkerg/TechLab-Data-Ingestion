<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - TechLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="/login">TechLab Panel de Control</a>
    </div>
  </nav>

  <!-- Formulario de inicio de sesión -->
  <main class="d-flex align-items-center justify-content-center flex-grow-1 p-4">
    <div class="card shadow" style="width: 100%; max-width: 420px;">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-4">Iniciar sesión</h4>
        <form method="POST" action="/login">
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input id="email" name="email" type="email" class="form-control" placeholder="user@example.com" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <p id="error" class="text-center fw-bold mt-3 mb-0"></p>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      const el = document.getElementById('error');
      el.className = 'text-center fw-bold mt-3 mb-0 text-danger';
      el.textContent = 'Credenciales inválidas. Intenta nuevamente.';
    }
    if (params.get('registered')) {
      const el = document.getElementById('error');
      el.className = 'text-center fw-bold mt-3 mb-0 text-success';
      el.textContent = 'Registro exitoso. Ahora puedes iniciar sesión.';
    }
  </script>
</body>

</html>
